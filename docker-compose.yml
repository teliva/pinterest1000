services:
  content_api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: pinterest_content_api
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./content:/app/content:ro
    environment:
      CONTENT_DIR: /app/content

  app:
    image: nginx:alpine
    container_name: pinterest_app
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./src/app:/usr/share/nginx/html:ro

  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: pinterest_mssql
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_password1"
      MSSQL_PID: "Developer"
    volumes:
      - mssql_data:/var/opt/mssql

  dotnet_api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: pinterest_dotnet_api
    restart: unless-stopped
    ports:
      - "8083:5000"
    volumes:
      - ./src/dotnet_api:/app:rw
    working_dir: /app
    environment:
      DOTNET_ENVIRONMENT: Development
    command: ["dotnet", "run", "--urls", "http://0.0.0.0:5000"]
    depends_on:
      - mssql
