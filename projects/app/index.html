<!DOCTYPE html>
<html lang="en" class="d-flex flex-column h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITSAssist Starter</title>
    <link rel="icon" type="image/x-icon" href="/KISP_Logo_Square_Dark_Teal.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet"
        crossorigin="anonymous">
    <style>
        .form-control:focus {
            border-color: inherit;
            -webkit-box-shadow: none;
            box-shadow: none;
            outline: 0;
        }

        .form-select:focus {
            border-color: inherit;
            -webkit-box-shadow: none;
            box-shadow: none;
            outline: 0;
        }
    </style>
    <script type="module" src="./main.js"></script>
</head>

<body class="bg-white flex-grow-1 d-flex flex-column p-3">
    <header class="navbar navbar-expand-lg sticky-top bg-white border-bottom py-2 mb-5">
        <div class="container-xxl">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="./KISP_Logo_Square_Dark_Teal.svg" alt="Logo" width="40" height="40"
                    class="d-inline-block align-text-top">
            </a>            
        </div>
    </header>
    <main>
        <div class="container-lg flex-grow-1">
            <div class="input-group mb-3 rounded-pill border border-2 overflow-hidden shadow-sm bg-light">
                <input type="search" class="form-control rounded-pill border-0 m-1 bg-light"
                    placeholder="Search styles, rooms, or categories" aria-label="Search styles, rooms, or categories"
                    aria-describedby="button-addon2">
                <button class="btn btn-light rounded-pill" type="button" id="search-button">
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-md-2">
                    <!-- Category -->
                    <select class="form-select text-dark bg-light border rounded-5 shadow-sm"
                        aria-label="Category select" id="category-filter">
                        <option value="0" selected>Choose a category...</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <!-- Room Type -->
                    <select class="form-select text-dark bg-light border rounded-5 shadow-sm"
                        aria-label="Room Type select" id="room-type-filter">
                        <option value="0" selected>Choose a room type...</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <!-- Style -->
                    <select class="form-select text-dark bg-light border rounded-5 shadow-sm" aria-label="Style select"
                        id="styles-filter">
                        <option value="0" selected>Choose a style...</option>
                    </select>
                </div>
            </div>

            <!-- Display my outputs -->
            <div class="row row-cols-1 row-cols-md-3 g-3" id="image-output-container">
            </div>
            <div class="d-flex flex-grow-1 justify-content-center align-items-center bg-light mt-3">
                <h4 class="m-2 p-0"><span id="totalNumResults">tilt</span> RESULTS</h4>
            </div>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

<template id="custom-image">
    <div class="col">
        <div class="card border rounded-4 shadow-sm position-relative h-100">
            <button type="button"
                class="btn btn-primary btn-sm rounded-circle shadow-sm position-absolute bottom-0 end-0 m-2"
                title="Open image" aria-label="Open image">
                <i class="bi bi-arrow-right-circle"></i>
            </button>
            <img class="img-fluid rounded-4" alt="Preview image" id="card-img">
        </div>

    </div>
</template>

</html>
