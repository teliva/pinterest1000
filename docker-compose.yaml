services:
  content_server:
    image: nginx:alpine
    container_name: pinterest_content_server
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./content:/usr/share/nginx/html:ro

  app:
    image: nginx:alpine
    container_name: pinterest_app
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./projects/app:/usr/share/nginx/html:ro

  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql_server_dev
    ports:
      - "1435:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"
      MSSQL_PID: "Developer"

  mssql_init:
    image: mcr.microsoft.com/mssql-tools
    container_name: pinterest_mssql_init
    depends_on:
      - mssql
    volumes:
      - ./projects/scripts:/scripts:ro
    environment:
      SA_PASSWORD: "YourStrongPassword123!"
    command: ["bash", "/scripts/init_db.sh"]
    restart: 'no'

  dotnet_api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: pinterest_dotnet_api
    restart: unless-stopped
    ports:
      - "8083:5000"
    volumes:
      - ./projects/dotnet_api:/app:rw
    working_dir: /app
    environment:
      DOTNET_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:5000"]
    depends_on:
      - mssql_init

volumes:
  mssql_data:
